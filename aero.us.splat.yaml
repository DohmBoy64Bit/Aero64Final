# Splat 0.x — Aero Fighters Assault (USA). Run from repo root:
#   wsl -e bash -lc "cd /mnt/c/.../Aero64Final && splat split aero.us.splat.yaml"
#
# Evidence for VRAM base 0x80200000:
#   - ROM: roms/afa.n64.us.z64 (8388608 bytes)
#   - Big-endian header word @ 0x08 (entry PC) = 0x80200050 (standard n64 header layout)
#   - ROM @ 0x1050 is addiu $sp,... (function prologue); 0x80200000 + 0x1050 - 0x1000 = 0x80200050
# Segment model: ethteck/splat docs/Segments.md ; options skeleton from test/basic_app/splat.yaml
#
# bss_size is a conservative placeholder — refine with a map or Ghidra once .bss is located.
#
# main subsegment ROM boundaries: first chunk 0x1000–0x1370, then splat 0.40.0 “file split suggestions”
# (206 boundaries) merged as separate asm TUs named game/rom_<offset>. Regenerate via
#   tools/scripts/gen_splat_subsegments.py + tools/scripts/_splat_split_lines.txt
#
# ROM integrity (splat warns if missing/mismatched): sha1 of roms/afa.n64.us.z64
sha1: 6742f67d7d2639072e186d240237be1c662cb25a

options:
  base_path: .
  platform: n64
  compiler: IDO
  basename: aero_us
  build_path: build/us
  target_path: roms/afa.n64.us.z64
  elf_path: build/us/aero.us.elf
  asm_path: split/us/asm
  src_path: split/us/src
  ld_script_path: split/us/aero.us.ld
  cache_path: split/us/.splache
  symbol_addrs_path: split/us/generated.symbols.txt
  undefined_funcs_auto_path: split/us/undefined_funcs_auto.txt
  undefined_syms_auto_path: split/us/undefined_syms_auto.txt
  asset_path: split/us/assets
  o_as_suffix: True
  ld_dependencies: True
  create_asm_dependencies: True
  disassemble_all: True
  make_full_disasm_for_code: True

segments:
  - name: header
    type: header
    start: 0x0

  - name: ipl3
    type: code
    start: 0x40
    vram: 0xA4000040
    subsegments:
      - [0x40, bin, boot/ipl3]

  - name: main
    type: code
    start: 0x1000
    vram: 0x80200000
    bss_size: 0x100000
