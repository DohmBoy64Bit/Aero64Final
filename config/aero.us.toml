# Aero Fighters Assault (USA) — N64Recomp config stub.
# Paths in [input] are relative to THIS file (same rule as Banjo-Kazooie recomp:
# Docs/RepoInjests/BanjoKazooie/banjorecomp-banjorecomp-8a5edab282632443.txt → FILE: banjo.us.rev0.toml).
#
# Do NOT invent entrypoint, ELF, or symbol paths. Fill after Splat → mips link → Ghidra verification.

[input]
# VRAM 0x80200050 (ROM 0x1050). Patched local N64Recomp compares entrypoint to ELF symbol VMA as uint32
# (tools/source/N64Recomp/src/elf.cpp).
entrypoint = 0x80200050
output_func_path = "../RecompiledFuncs"
rom_file_path = "../roms/afa.n64.us.z64"
# Splat-linked ELF (jump tables / rodata layout for N64Recomp): AERO_LINK_MODE=splatasm
# bash tools/scripts/build_aero_us_elf.sh → build/us/aero.us.splatasm.elf
# Bootstrap-only ELF (raw .incbin .text): default same script → build/us/aero.us.elf
elf_path = "../build/us/aero.us.splatasm.elf"
# symbols_file_path = "../build/aero.us.syms.toml"
bss_section_suffix = "_bss"

# func_802000DC is glabeled in splatasm asm at 0x802000DC but often has st_size 0 in the ELF; N64Recomp
# then emits a zero-width static for jal targets from recomp_entrypoint. Override the span in bytes
# (0x18 = 6 words through jr $ra delay slot; USA ROM at ROM 0x1000 + 0xDC).
function_sizes = [
    { name = "func_802000DC", size = 0x18 },
    # Splatasm ELF st_size is often 0 for .main glabels; N64Recomp needs explicit spans (see Docs/Debugging.md).
    # `func_802000A0`: ROM resume after `func_8022970C` (`jal` return @ 0x802000A0) through word before `func_802000DC` @ 0x802000DC => 0x3C bytes.
    # `func_80228DE0`: first `jal` target inside that slice; next symbol @ 0x80228E14 => 0x34 bytes.
    { name = "func_802000A0", size = 0x3C },
    { name = "func_80228DE0", size = 0x34 },
    # Boot tail inside `func_80231A24` (manual `static_3_80231A24` in aero_boot_chain_manual.c): ROM `jal` order
    # 0x8023CE80, 0x80237E10, 0x8023F020, 0x80230F68. Base spans from data_dump.toml; expanded where N64Recomp
    # warned "branching outside of the function" (else MSVC C2094 undefined `L_…` labels in emitted C).
    { name = "func_8023CE80", size = 0xC0 },
    { name = "func_80237E10", size = 0x150 },
    { name = "func_8023F020", size = 0x1E0 },
    { name = "func_80230F68", size = 0x100 },
    # First `jal` inside `D_80200370` (VMA 0x80223840). Span = bytes until `jr $ra` in USA ROM (`roms/afa.n64.us.z64`,
    # Capstone). `function_sizes` keys must match **ELF** names (`tools/source/N64Recomp/src/elf.cpp`); output may be
    # `static_3_80223840` in `RecompiledFuncs/*.c` but the override name is `func_80223840` (`data_dump.toml`).
    { name = "func_80223840", size = 0x60 },
    { name = "func_8022393C", size = 0x1A4 },
    # `D_80200370` path: many `jal`s to `static_3_80225424` / `static_3_8022B948` when ELF st_size is 0.
    # Spans = bytes from VMA through `jr $ra` delay slot (USA `roms/afa.n64.us.z64` / `aero_us.z64`, Capstone);
    # not always `next_vram - start` in `data_dump.toml` (gaps can include following glabels).
    { name = "func_80225424", size = 0x80 },
    { name = "func_8022B948", size = 0xC0 },
    # `func_8022B948` → `jal` targets; splatasm ELF st_size 0. Spans from USA ROM (Capstone) to `jr $ra` (+delay);
    # `func_8022B374` / `func_8022B80C` are real entrypoints mid-range (see ROM @ those PCs).
    { name = "func_8022B2F4", size = 0x11C },
    { name = "func_8022B374", size = 0x9C },
    { name = "func_8022B460", size = 0x130 },
    { name = "func_8022B80C", size = 0xEC },
]

# Splatasm ELF exports aero_boot_entry at 0x80200050 with a real .size (split/us/asm/game/rom_00001000.s
# endlabel). Bootstrap single-blob regen still uses function_sizes in config/aero.us.regen.toml.

[patches]
# spimdisasm sometimes emits FUNC glabels on data; N64Recomp can fault analyzing bogus opcodes.
# Wildcard `D_*` removed: N64Recomp errors if a wildcard matches no `functions_by_name` keys; re-add explicit
# `D_…` symbol names when a future ELF needs them.
# `D_8020015C` (ELF) fails jump-table analysis; boot uses manual `func_D_8020015C` in aero_boot_chain_manual.c
# and aero_recomp_host.cpp — ignore the mis-typed FUNC symbol here.
#
# These `func_*` were data mis-labeled as FUNC (see Docs/Debugging.md): `ignored` drops all callees' symbols and
# breaks the link; `stubs` keeps a recomp stub so `jal` resolves (`tools/source/N64Recomp/src/main.cpp` stub path).
stubs = [
    "func_80234ED0",
    "func_8023D7A0",
    "func_80248090",
    "func_8023CD40",
    "func_8029C46C",
]
